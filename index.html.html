<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 유사성 자동 분석 — 데이즈온</title>
<script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Malgun Gothic', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
  .container { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem; }
  h1 { font-size: 22px; font-weight: 600; color: #1B3A6B; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6B7280; margin-bottom: 2rem; }

  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .upload-card { background: #fff; border: 1.5px dashed #CBD5E1; border-radius: 12px; padding: 0; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.15s; position: relative; overflow: hidden; }
  .upload-card:hover { border-color: #2563A8; }
  .upload-card.filled { border-style: solid; border-color: #CBD5E1; }
  .upload-card img { width: 100%; height: 200px; object-fit: contain; display: block; }
  .upload-card input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-inner { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .badge-blue { background: #DBEAFE; color: #1B3A6B; }
  .badge-red  { background: #FEF2F2; color: #DC2626; }
  .upload-label { font-size: 13px; font-weight: 500; color: #374151; }
  .upload-hint  { font-size: 11px; color: #9CA3AF; }

  .meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 500; color: #6B7280; }
  .field input { height: 36px; border: 1px solid #E5E7EB; border-radius: 8px; padding: 0 10px; font-size: 13px; background: #fff; outline: none; width: 100%; }
  .field input:focus { border-color: #2563A8; }

  .btn-primary { width: 100%; height: 42px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: #1B3A6B; color: #fff; transition: background 0.15s; margin-bottom: 1.5rem; }
  .btn-primary:hover:not(:disabled) { background: #2563A8; }
  .btn-primary:disabled { background: #CBD5E1; cursor: not-allowed; }

  .section { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .section-header { padding: 12px 16px; background: #F8FAFC; border-bottom: 1px solid #E5E7EB; font-size: 13px; font-weight: 600; color: #1B3A6B; display: flex; align-items: center; gap: 8px; }
  table.compare { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.compare th { padding: 8px 16px; background: #F8FAFC; font-weight: 600; font-size: 12px; color: #6B7280; border-bottom: 1px solid #E5E7EB; text-align: left; }
  table.compare td { padding: 10px 16px; border-bottom: 1px solid #F3F4F6; vertical-align: top; line-height: 1.6; }
  table.compare tr:last-child td { border-bottom: none; }
  .col-label { width: 25%; font-weight: 500; color: #374151; background: #F8FAFC; }
  .col-my    { width: 37.5%; color: #1a1a1a; }
  .col-inf   { width: 37.5%; }
  .similar   { color: #DC2626; font-weight: 600; }
  .opinion-body { padding: 16px; font-size: 13px; color: #374151; line-height: 1.8; }
  .opinion-item { margin-bottom: 10px; }
  .opinion-item strong { color: #1B3A6B; }
  .opinion-final { color: #DC2626; font-weight: 600; }

  .btn-dl { width: 100%; height: 42px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid #1B3A6B; background: #fff; color: #1B3A6B; transition: background 0.15s; }
  .btn-dl:hover { background: #EBF2FB; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff4; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -3px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none; }
  .step-badge { display: inline-block; background: #1B3A6B; color: #fff; font-size: 11px; font-weight: 700; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; margin-right: 6px; }
  .upload-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(27,58,107,0.85); color: #fff; font-size: 11px; text-align: center; padding: 4px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>디자인 유사성 자동 분석</h1>
  <p class="subtitle">두 이미지를 업로드하면 AI가 비교표를 자동으로 채우고 Word 파일로 다운로드할 수 있어요.</p>

  <div class="upload-grid">
    <div class="upload-card" id="box-my" onclick="document.getElementById('file-my').click()">
      <input type="file" id="file-my" accept="image/*">
      <div class="upload-inner" id="inner-my">
        <span class="badge badge-blue">정품 도면</span>
        <svg width="28" height="28" fill="none" stroke="#9CA3AF" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span class="upload-label">정품 도면 업로드</span>
        <span class="upload-hint">클릭하여 파일 선택</span>
      </div>
    </div>
    <div class="upload-card" id="box-inf" onclick="document.getElementById('file-inf').click()">
      <input type="file" id="file-inf" accept="image/*">
      <div class="upload-inner" id="inner-inf">
        <span class="badge badge-red">침해 상품</span>
        <svg width="28" height="28" fill="none" stroke="#9CA3AF" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span class="upload-label">침해 상품 이미지 업로드</span>
        <span class="upload-hint">클릭하여 파일 선택</span>
      </div>
    </div>
  </div>

  <div class="meta-row">
    <div class="field"><label>정품 브랜드명</label><input id="brand-my" placeholder="예: 데이즈온" value="데이즈온"></div>
    <div class="field"><label>침해 브랜드명</label><input id="brand-inf" placeholder="예: CENTHUE"></div>
    <div class="field"><label>정품 상품명</label><input id="product-my" placeholder="예: 파라다이스 그레인 버닝" value="파라다이스 그레인 버닝"></div>
    <div class="field"><label>침해 상품명</label><input id="product-inf" placeholder="예: 파라다이스 그레인 버닝"></div>
  </div>

  <button class="btn-primary" id="btn-analyze" disabled onclick="analyze()">AI로 유사성 분석하기</button>

  <div id="result-area" class="hidden">
    <div class="section">
      <div class="section-header">디자인 비교표</div>
      <table class="compare">
        <thead><tr><th>비교 항목</th><th id="th-my">정품</th><th id="th-inf">침해 상품</th></tr></thead>
        <tbody id="compare-rows"></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-header">종합 의견</div>
      <div class="opinion-body" id="opinion-body"></div>
    </div>

    <button class="btn-dl" id="btn-dl" onclick="downloadDocx()">Word 파일로 다운로드 (.docx)</button>
  </div>
</div>

<script>
let myB64 = null, infB64 = null, myMime = 'image/jpeg', infMime = 'image/jpeg';
let analysisResult = null;

function setupUpload(fileId, boxId, mimeRef, b64Ref) {
  document.getElementById(fileId).addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const result = ev.target.result;
      if (fileId === 'file-my') { myB64 = result; myMime = file.type || 'image/jpeg'; }
      else { infB64 = result; infMime = file.type || 'image/jpeg'; }
      const box = document.getElementById(boxId);
      box.classList.add('filled');
      box.innerHTML = `<img src="${result}" alt="업로드 이미지"><div class="upload-overlay">클릭하여 변경</div><input type="file" id="${fileId}" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;">`;
      document.getElementById(fileId).addEventListener('change', arguments.callee.bind({fileId, boxId}));
      checkReady();
    };
    reader.readAsDataURL(file);
  });
}

setupUpload('file-my',  'box-my');
setupUpload('file-inf', 'box-inf');

function checkReady() {
  document.getElementById('btn-analyze').disabled = !(myB64 && infB64);
}

async function analyze() {
  const btn = document.getElementById('btn-analyze');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>AI 분석 중...';

  const brandMy  = document.getElementById('brand-my').value  || '정품';
  const brandInf = document.getElementById('brand-inf').value || '침해 상품';
  const prodMy   = document.getElementById('product-my').value || '';
  const prodInf  = document.getElementById('product-inf').value || '';

  const prompt = `아래 두 이미지는 디자인/실용신안 침해 분쟁 관련 상품 패키지입니다.
첫 번째: ${brandMy} "${prodMy}" 정품 도면
두 번째: ${brandInf} "${prodInf}" 침해 의심 상품

디자인 외관 관점에서만 비교하세요 (상품명, 성분, 용량은 제외).
반드시 아래 JSON만 출력하세요. 다른 텍스트 없이 JSON만:

{
  "rows": [
    {"item":"패키지 색상","my":"설명","inf":"설명","similar":true},
    {"item":"브랜드명 위치","my":"설명","inf":"설명","similar":true},
    {"item":"제품명 폰트/스타일","my":"설명","inf":"설명","similar":true},
    {"item":"레이아웃 구성","my":"설명","inf":"설명","similar":true},
    {"item":"전체 디자인 인상","my":"설명","inf":"설명","similar":true},
    {"item":"제조사 표기","my":"설명","inf":"설명","similar":false}
  ],
  "opinions": [
    {"label":"색상 유사성","text":"내용","danger":false},
    {"label":"레이아웃 유사성","text":"내용","danger":false},
    {"label":"전체 디자인 유사성","text":"내용","danger":false},
    {"label":"종합 의견","text":"내용","danger":true}
  ]
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: myMime,  data: myB64.split(',')[1] } },
            { type: 'image', source: { type: 'base64', media_type: infMime, data: infB64.split(',')[1] } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    const raw = data.content?.find(c => c.type === 'text')?.text || '{}';
    analysisResult = JSON.parse(raw.replace(/```json|```/g, '').trim());
    render();
    btn.innerHTML = '분석 완료 — 다시 분석하기';
    btn.disabled = false;
  } catch(e) {
    btn.innerHTML = '오류 발생 — 다시 시도';
    btn.disabled = false;
    alert('분석 중 오류가 발생했어요: ' + e.message);
  }
}

function render() {
  const brandMy  = document.getElementById('brand-my').value  || '정품';
  const brandInf = document.getElementById('brand-inf').value || '침해 상품';
  document.getElementById('th-my').textContent  = brandMy + ' (정품)';
  document.getElementById('th-inf').textContent = brandInf + ' (침해)';

  const tbody = document.getElementById('compare-rows');
  tbody.innerHTML = '';
  analysisResult.rows.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="col-label">${r.item}</td><td class="col-my">${r.my}</td><td class="col-inf ${r.similar ? 'similar' : ''}">${r.inf}${r.similar ? ' ← 유사' : ''}</td>`;
    tbody.appendChild(tr);
  });

  const ob = document.getElementById('opinion-body');
  ob.innerHTML = '';
  analysisResult.opinions.forEach(o => {
    const div = document.createElement('div');
    div.className = 'opinion-item';
    div.innerHTML = `<strong class="${o.danger ? 'opinion-final' : ''}">${o.label}: </strong><span class="${o.danger ? 'opinion-final' : ''}">${o.text}</span>`;
    ob.appendChild(div);
  });

  document.getElementById('result-area').classList.remove('hidden');
}

async function downloadDocx() {
  if (!analysisResult) return;
  const btn = document.getElementById('btn-dl');
  btn.textContent = '생성 중...';
  btn.disabled = true;

  const brandMy  = document.getElementById('brand-my').value  || '정품';
  const brandInf = document.getElementById('brand-inf').value || '침해 상품';
  const prodMy   = document.getElementById('product-my').value || '';
  const prodInf  = document.getElementById('product-inf').value || '';
  const today    = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});

  const {
    Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
    AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign, ImageRun, Header
  } = docx;

  const bd  = (c='CBD5E1') => ({style:BorderStyle.SINGLE, size:4, color:c});
  const cBd = (c='CBD5E1') => ({top:bd(c),bottom:bd(c),left:bd(c),right:bd(c)});
  const sp  = (pts=6) => new Paragraph({spacing:{before:pts*20,after:0},children:[]});
  const rl  = () => new Paragraph({border:{bottom:{style:BorderStyle.SINGLE,size:8,color:'2563A8',space:1}},spacing:{before:0,after:120},children:[]});

  const secTitle = (txt) => new Paragraph({
    spacing:{before:280,after:100},
    border:{left:{style:BorderStyle.SINGLE,size:20,color:'2563A8',space:8}},
    indent:{left:160},
    children:[new TextRun({text:txt, size:24, bold:true, color:'1B3A6B', font:'맑은 고딕'})]
  });

  const lbCell = (txt,w,fill='DBEAFE') => new TableCell({
    width:{size:w,type:WidthType.DXA}, borders:cBd('CBD5E1'),
    shading:{fill,type:ShadingType.CLEAR}, verticalAlign:VerticalAlign.CENTER,
    margins:{top:80,bottom:80,left:160,right:160},
    children:[new Paragraph({alignment:AlignmentType.CENTER, children:[
      new TextRun({text:txt,size:20,bold:true,color:'1B3A6B',font:'맑은 고딕'})
    ]})]
  });
  const vlCell = (txt,w,fill='FFFFFF',color='1A1A1A',bold=false) => new TableCell({
    width:{size:w,type:WidthType.DXA}, borders:cBd('CBD5E1'),
    shading:{fill,type:ShadingType.CLEAR}, verticalAlign:VerticalAlign.CENTER,
    margins:{top:80,bottom:80,left:160,right:160},
    children:[new Paragraph({children:[
      new TextRun({text:txt,size:19,color,bold,font:'맑은 고딕'})
    ]})]
  });

  async function urlToBuffer(dataUrl) {
    const res = await fetch(dataUrl);
    return await res.arrayBuffer();
  }

  const myBuf  = await urlToBuffer(myB64);
  const infBuf = await urlToBuffer(infB64);

  const imgCell = (buf, mime, w, h, cellW) => new TableCell({
    width:{size:cellW,type:WidthType.DXA}, borders:cBd('CBD5E1'),
    shading:{fill:'FFFFFF',type:ShadingType.CLEAR}, margins:{top:80,bottom:80,left:80,right:80},
    children:[new Paragraph({alignment:AlignmentType.CENTER, children:[
      new ImageRun({data:buf, type: mime.includes('png') ? 'png' : 'jpg', transformation:{width:w,height:h}})
    ]})]
  });
  const srcCell = (txt, w) => new TableCell({
    width:{size:w,type:WidthType.DXA}, borders:cBd('CBD5E1'),
    shading:{fill:'F8F9FA',type:ShadingType.CLEAR}, margins:{top:60,bottom:60,left:160,right:160},
    children:[new Paragraph({children:[
      new TextRun({text:'출처: ',size:18,bold:true,color:'6B7280',font:'맑은 고딕'}),
      new TextRun({text:txt,size:18,color:'1A1A1A',font:'맑은 고딕'})
    ]})]
  });

  const cmpRow = (item,my,inf,hl) => new TableRow({children:[
    new TableCell({width:{size:2200,type:WidthType.DXA},borders:cBd('CBD5E1'),shading:{fill:hl?'DBEAFE':'F8F9FA',type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:160,right:160},
      children:[new Paragraph({children:[new TextRun({text:item,size:19,bold:true,color:'1B3A6B',font:'맑은 고딕'})]})]}),
    new TableCell({width:{size:3413,type:WidthType.DXA},borders:cBd('CBD5E1'),shading:{fill:'FFFFFF',type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:160,right:160},
      children:[new Paragraph({children:[new TextRun({text:my,size:19,color:'1A1A1A',font:'맑은 고딕'})]})]}),
    new TableCell({width:{size:3413,type:WidthType.DXA},borders:cBd('CBD5E1'),shading:{fill:hl?'FEF2F2':'FFFFFF',type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:160,right:160},
      children:[new Paragraph({children:[new TextRun({text: inf + (hl?' ← 유사':''),size:19,bold:hl,color:hl?'DC2626':'1A1A1A',font:'맑은 고딕'})]})]}),
  ]});

  const opinionRows = analysisResult.opinions.map(o =>
    new TableRow({children:[
      new TableCell({width:{size:2200,type:WidthType.DXA},borders:cBd('CBD5E1'),shading:{fill:o.danger?'FEF2F2':'F8F9FA',type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:160,right:160},
        children:[new Paragraph({children:[new TextRun({text:o.label,size:19,bold:true,color:o.danger?'DC2626':'1B3A6B',font:'맑은 고딕'})]})]}),
      new TableCell({width:{size:6826,type:WidthType.DXA},borders:cBd('CBD5E1'),shading:{fill:'FFFFFF',type:ShadingType.CLEAR},margins:{top:80,bottom:80,left:160,right:160},
        children:[new Paragraph({children:[new TextRun({text:o.text,size:19,bold:o.danger,color:o.danger?'DC2626':'1A1A1A',font:'맑은 고딕'})]})]}),
    ]})
  );

  const doc2 = new Document({
    styles:{default:{document:{run:{font:'맑은 고딕',size:21,color:'1A1A1A'}}}},
    sections:[{
      headers:{default: new Header({children:[
        new Paragraph({alignment:AlignmentType.RIGHT,
          border:{bottom:{style:BorderStyle.SINGLE,size:4,color:'2563A8',space:4}},
          children:[new TextRun({text:`디자인 유사성 비교 자료  |  ${brandMy} vs ${brandInf}  |  ${today}`,size:18,color:'6B7280',font:'맑은 고딕'})]
        })
      ]})},
      properties:{page:{size:{width:11906,height:16838},margin:{top:1134,right:1134,bottom:1134,left:1134}}},
      children:[
        sp(4),
        new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:30},
          children:[new TextRun({text:'디자인 유사성 비교 자료',size:48,bold:true,color:'1B3A6B',font:'맑은 고딕'})]}),
        new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:20},
          children:[new TextRun({text:`${brandMy} ${prodMy}  vs  ${brandInf} ${prodInf}`,size:20,bold:true,color:'EA580C',font:'맑은 고딕'})]}),
        new Paragraph({alignment:AlignmentType.CENTER,spacing:{before:0,after:20},
          children:[new TextRun({text:`작성일: ${today}`,size:18,color:'6B7280',font:'맑은 고딕'})]}),
        rl(), sp(4),

        secTitle('1. 상품 이미지 비교'), sp(2),
        new Table({width:{size:9026,type:WidthType.DXA},columnWidths:[4513,4513],rows:[
          new TableRow({children:[
            new TableCell({width:{size:4513,type:WidthType.DXA},borders:cBd('2563A8'),shading:{fill:'DBEAFE',type:ShadingType.CLEAR},margins:{top:100,bottom:100,left:160,right:160},
              children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:`정품 도면 — ${brandMy}`,size:22,bold:true,color:'1B3A6B',font:'맑은 고딕'})]})] }),
            new TableCell({width:{size:4513,type:WidthType.DXA},borders:cBd('2563A8'),shading:{fill:'FEF2F2',type:ShadingType.CLEAR},margins:{top:100,bottom:100,left:160,right:160},
              children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:`침해 상품 — ${brandInf}`,size:22,bold:true,color:'DC2626',font:'맑은 고딕'})]})] }),
          ]}),
          new TableRow({children:[
            imgCell(myBuf,  myMime,  290, 163, 4513),
            imgCell(infBuf, infMime, 290, 217, 4513),
          ]}),
          new TableRow({children:[

          ]}),
        ]}),
        sp(8),

        secTitle('2. 디자인 비교 (유사성 입증)'), sp(2),
        new Table({width:{size:9026,type:WidthType.DXA},columnWidths:[2200,3413,3413],rows:[
          new TableRow({children:[
            lbCell('비교 항목',2200),
            lbCell(`${brandMy} (정품)`,3413),
            new TableCell({width:{size:3413,type:WidthType.DXA},borders:cBd('CBD5E1'),shading:{fill:'FEF2F2',type:ShadingType.CLEAR},margins:{top:100,bottom:100,left:160,right:160},
              children:[new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:`${brandInf} (침해)`,size:20,bold:true,color:'DC2626',font:'맑은 고딕'})]})]}),
          ]}),
          ...analysisResult.rows.map(r => cmpRow(r.item, r.my, r.inf, r.similar)),

        secTitle('3. 종합 의견'), sp(2),
        new Table({width:{size:9026,type:WidthType.DXA},columnWidths:[2200,6826],rows:[
          new TableRow({children:[
            lbCell('구분',2200),

        sp(10),

        new Paragraph({alignment:AlignmentType.RIGHT,
          children:[new TextRun({text:`${today}    작성자: ${brandMy} 법무팀  (서명/인)`,size:19,color:'6B7280',font:'맑은 고딕'})]}),
        sp(4), rl(),

  });

  const buf = await Packer.toBuffer(doc2);
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `디자인비교_${brandMy}vs${brandInf}_${new Date().toISOString().slice(0,10)}.docx`;
  a.click();

  btn.textContent = 'Word 파일로 다운로드 (.docx)';
  btn.disabled = false;
}
